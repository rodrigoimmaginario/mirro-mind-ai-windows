name: Build Installer

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        shell: bash
        run: |
          git init
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git config core.protectNTFS false
          git sparse-checkout init --no-cone
          echo -e '/*\n!/.claude/skills/' > .git/info/sparse-checkout
          git fetch --depth=1 origin "${{ github.sha }}"
          git checkout FETCH_HEAD

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Create dist directory
        run: New-Item -ItemType Directory -Force dist | Out-Null

      - name: Compile installer
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" installer\MirrorMind.nsi
          Get-Item dist\MirrorMindSetup.exe | Select-Object Name, Length

      # --- Smoke Tests ---

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: "Test: win_compat.py selftest"
        run: uv run python adapter\win_compat.py --selftest

      - name: "Test: uv sync"
        run: uv sync

      - name: "Test: memory module imports"
        run: uv run python -c "import memory; print('OK:', memory.__file__)"

      - name: "Test: memory CLI responds"
        run: |
          $output = uv run python -m memory --help 2>&1
          if ($output -match "Usage:") { Write-Host "OK: CLI responds"; exit 0 } else { Write-Host "FAIL: no usage output"; exit 1 }

      - name: "Test: health_check.ps1"
        run: |
          $env:PYTHONSTARTUP = Join-Path (Get-Location) "adapter\win_compat.py"
          powershell -ExecutionPolicy Bypass -File adapter\health_check.ps1 -RepoDir (Get-Location).Path -AdapterDir (Join-Path (Get-Location) "adapter")
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Health check had failures (expected: PYTHONSTARTUP not in user env)" -ForegroundColor Yellow
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: MirrorMindSetup
          path: dist/MirrorMindSetup.exe

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/MirrorMindSetup.exe
          generate_release_notes: true
