name: Build Installer

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Create dist directory
        run: New-Item -ItemType Directory -Force dist | Out-Null

      - name: Compile installer
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" installer\MirrorMind.nsi
          Get-Item dist\MirrorMindSetup.exe | Select-Object Name, Length

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: MirrorMindSetup
          path: dist/MirrorMindSetup.exe

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MirrorMindSetup.exe
          generate_release_notes: true
